[[systems]]
system = "customized-amd64-docker"
ssh = { private-key = "./keys/id_rsa" }

[[steps]]
action = "run"
description = "verify no apps are installed"
script = """
#!/bin/bash
set -euo pipefail
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e 'length == 0'
"""

[[steps]]
action = "run"
description = "install the binary app bundle"
stdin-file = "./apps/build/binary-hello_amd64.rugixb"
script = """
#!/bin/bash
set -euo pipefail
cat /dev/stdin > /root/app-bundle.rugixb
rugix-ctrl apps install --insecure-skip-bundle-verification /root/app-bundle.rugixb
"""

[[steps]]
action = "wait"
duration = 3

[[steps]]
action = "run"
description = "verify the app is listed and running"
script = """
#!/bin/bash
set -euo pipefail
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e '.["hello-binary"]'
echo "$OUTPUT" | jq -e '.["hello-binary"].status.state == "running"'
echo "$OUTPUT" | jq -e '.["hello-binary"].generation == 1'
"""

[[steps]]
action = "run"
description = "verify the marker file exists"
script = """
#!/bin/bash
set -euo pipefail
MARKER=$(cat /run/rugix/state/apps/hello-binary/data/running)
echo "marker: $MARKER"
[ "$MARKER" = "hello-binary" ]
"""

[[steps]]
action = "run"
description = "verify the systemd unit is active"
script = """
#!/bin/bash
set -euo pipefail
systemctl is-active rugix-app-hello-binary.service
"""

[[steps]]
action = "run"
description = "verify app info output"
script = """
#!/bin/bash
set -euo pipefail
OUTPUT=$(rugix-ctrl apps info hello-binary)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e '.name == "hello-binary"'
echo "$OUTPUT" | jq -e '.state.state == "active"'
echo "$OUTPUT" | jq -e '.state.generation == 1'
echo "$OUTPUT" | jq -e '.generations | length == 1'
echo "$OUTPUT" | jq -e '.generations[0].current == true'
echo "$OUTPUT" | jq -e '.generations[0].complete == true'
"""

[[steps]]
action = "run"
description = "deactivate the app"
script = """
#!/bin/bash
set -euo pipefail
rugix-ctrl apps deactivate hello-binary
"""

[[steps]]
action = "run"
description = "verify the app is inactive"
script = """
#!/bin/bash
set -euo pipefail
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e '.["hello-binary"].status.state == "stopped"'
echo "$OUTPUT" | jq -e '.["hello-binary"].generation == null'
"""

[[steps]]
action = "run"
description = "verify the marker file was cleaned up"
script = """
#!/bin/bash
set -euo pipefail
! test -f /run/rugix/state/apps/hello-binary/data/running
"""

[[steps]]
action = "run"
description = "re-activate the app"
script = """
#!/bin/bash
set -euo pipefail
rugix-ctrl apps activate hello-binary 1
"""

[[steps]]
action = "wait"
duration = 3

[[steps]]
action = "run"
description = "verify the app is running again"
script = """
#!/bin/bash
set -euo pipefail
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e '.["hello-binary"].status.state == "running"'
MARKER=$(cat /run/rugix/state/apps/hello-binary/data/running)
[ "$MARKER" = "hello-binary" ]
"""

[[steps]]
action = "run"
description = "reboot the system"
may-disconnect = true
script = """
#!/bin/bash
set -euo pipefail
reboot
"""

[[steps]]
action = "wait"
duration = 10

[[steps]]
action = "run"
description = "verify the unit was restored into /run after reboot"
script = """
#!/bin/bash
set -euo pipefail
echo "--- persisted units ---"
ls -la /run/rugix/state/apps/hello-binary/generations/1/.rugix/systemd/units/ || echo "no persisted units dir"
echo "--- runtime units ---"
ls -la /run/systemd/system/rugix-app-hello-binary.service || echo "unit NOT in /run/systemd/system"
echo "--- app state ---"
cat /run/rugix/state/apps/hello-binary/.rugix/state.json || echo "no state file"
echo "--- sync service ---"
systemctl status rugix-apps-restore-units.service || true
echo "--- systemctl list-units rugix* ---"
systemctl list-units 'rugix*' --no-pager || true
"""

[[steps]]
action = "run"
description = "verify the app is running after reboot"
script = """
#!/bin/bash
set -euo pipefail
sleep 10
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e '.["hello-binary"].status.state == "running"'
echo "$OUTPUT" | jq -e '.["hello-binary"].generation == 1'
systemctl is-active rugix-app-hello-binary.service
MARKER=$(cat /run/rugix/state/apps/hello-binary/data/running)
echo "marker: $MARKER"
[ "$MARKER" = "hello-binary" ]
"""

[[steps]]
action = "run"
description = "remove the app"
script = """
#!/bin/bash
set -euo pipefail
rugix-ctrl apps remove hello-binary
OUTPUT=$(rugix-ctrl apps list)
echo "$OUTPUT"
echo "$OUTPUT" | jq -e 'length == 0'
"""
