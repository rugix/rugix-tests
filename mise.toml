# Toolchain for the pytest test suite. ``qemu`` and ``openssh`` are
# expected on PATH; the bake stage runs inside the rugix-bakery container.

[tools]
uv = "latest"
python = "3.11"

[tasks.test]
description = "Run all tests."
run = './scripts/run-pytest.sh "$@"'

[tasks.typecheck]
description = "Run mypy on the harness and tests."
run = "uv run --group dev mypy harness/ tests/ conftest.py"

[tasks.lint]
description = "Lint and format-check the harness and tests."
run = '''
uv run --group dev ruff check harness/ tests/ conftest.py
uv run --group dev ruff format --check harness/ tests/ conftest.py
'''

[tasks.fmt]
description = "Auto-fix lint errors and format code."
run = '''
uv run --group dev ruff check --fix harness/ tests/ conftest.py
uv run --group dev ruff format harness/ tests/ conftest.py
'''

[tasks.check]
description = "Run all checks (lint, format, typecheck, test) sequentially."
# Single ``uv sync`` up front so the parallel ``uv run`` invocations underneath
# the individual tasks don't race on .venv setup.
run = '''
uv sync --group dev
uv run ruff check harness/ tests/ conftest.py
uv run ruff format --check harness/ tests/ conftest.py
uv run mypy harness/ tests/ conftest.py
./scripts/run-pytest.sh "$@"
'''
