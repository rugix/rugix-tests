# Toolchain for the pytest test suite: Python + uv on the host (to drive
# pytest). ``qemu`` and ``openssh`` are expected on PATH (provided by the
# system package manager or the runner's NixOS configuration).
#
# The bake stage runs inside the rugix-bakery container via ``./run-bakery``;
# only test execution uses the tools declared here.

[tools]
uv = "latest"
python = "3.11"

[tasks.test]
description = "Run all tests."
run = 'uv run --group dev pytest "$@"'

[tasks.typecheck]
description = "Run mypy on the harness and tests."
run = "uv run --group dev mypy harness/ tests/ conftest.py"

[tasks.lint]
description = "Lint and format-check the harness and tests."
run = '''
uv run --group dev ruff check harness/ tests/ conftest.py
uv run --group dev ruff format --check harness/ tests/ conftest.py
'''

[tasks.fmt]
description = "Auto-fix lint errors and format code."
run = '''
uv run --group dev ruff check --fix harness/ tests/ conftest.py
uv run --group dev ruff format harness/ tests/ conftest.py
'''

[tasks.check]
description = "Run all checks (lint, format, typecheck, test)."
depends = ["lint", "typecheck", "test"]
